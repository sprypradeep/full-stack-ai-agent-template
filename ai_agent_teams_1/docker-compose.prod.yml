
# Production configuration
# with Traefik reverse proxy
#
# Usage:
#   1. Copy .env.prod.example to .env.prod and fill in values:
#      cp .env.prod.example .env.prod
#   2. Run: docker-compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Configure .env.prod with DOMAIN and ACME_EMAIL
#   2. Ensure ports 80 and 443 are available
#   3. Generate passwords: openssl rand -base64 32

services:
  traefik:
    image: traefik:v3.2
    container_name: ai_agent_teams_1_traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Access logs
      - "--accesslog=true"
      - "--accesslog.bufferingsize=100"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - traefik-public
    labels:
      # Dashboard
      - "traefik.enable=true"
      - "traefik.http.routers.ai_agent_teams_1-traefik.rule=Host(`traefik.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.ai_agent_teams_1-traefik.entrypoints=websecure"
      - "traefik.http.routers.ai_agent_teams_1-traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ai_agent_teams_1-traefik.service=api@internal"
      - "traefik.http.routers.ai_agent_teams_1-traefik.middlewares=ai_agent_teams_1-auth"
      - "traefik.http.middlewares.ai_agent_teams_1-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:$$apr1$$xyz$$hash}"
      # Security headers middleware
      - "traefik.http.middlewares.ai_agent_teams_1-security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.ai_agent_teams_1-security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.ai_agent_teams_1-security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.ai_agent_teams_1-security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.ai_agent_teams_1-security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.ai_agent_teams_1-security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.ai_agent_teams_1-security-headers.headers.frameDeny=true"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_agent_teams_1_backend
    volumes:
      - media_data:/app/media
    env_file:
      - .env.prod
      - ./backend/.env
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    networks:
      - traefik-public
      - backend-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai_agent_teams_1-api.rule=Host(`api.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.ai_agent_teams_1-api.entrypoints=websecure"
      - "traefik.http.routers.ai_agent_teams_1-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ai_agent_teams_1-api.middlewares=ai_agent_teams_1-security-headers@docker"
      - "traefik.http.services.ai_agent_teams_1-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik-public"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  db:
    image: postgres:16-alpine
    container_name: ai_agent_teams_1_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-ai_agent_teams_1}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NO external ports - only accessible within backend-internal network
    networks:
      - backend-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: ai_agent_teams_1_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    # NO external ports - only accessible within backend-internal network
    volumes:
      - redis_data:/data
    networks:
      - backend-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: ai_agent_teams_1_etcd
    volumes:
      - etcd_data:/var/lib/etcd
    networks:
      - backend-internal
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: ai_agent_teams_1_minio
    command: server /data --console-address ":9001"
    # NO external ports - only accessible within backend-internal network
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changeme}
    networks:
      - backend-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  milvus:
    image: milvusdb/milvus:v2.5.10
    container_name: ai_agent_teams_1_milvus
    command: ["milvus", "run", "standalone"]
    # NO external ports - only accessible within backend-internal network
    volumes:
      - milvus_data:/var/lib/milvus
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - backend-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  celery_worker:
    image: ai_agent_teams_1_backend:dev
    container_name: ai_agent_teams_1_celery_worker
    volumes:
      - media_data:/app/media
    command: celery -A app.worker.celery_app worker --loglevel=warning --concurrency=4
    env_file:
      - .env.prod
      - ./backend/.env
    environment:
      - DEBUG=false
      - REDIS_HOST=redis
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - backend-internal
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      milvus:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  celery_beat:
    image: ai_agent_teams_1_backend:dev
    container_name: ai_agent_teams_1_celery_beat
    command: celery -A app.worker.celery_app beat --loglevel=warning
    env_file:
      - .env.prod
      - ./backend/.env
    environment:
      - DEBUG=false
      - REDIS_HOST=redis
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - backend-internal
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  flower:
    image: ai_agent_teams_1_backend:dev
    container_name: ai_agent_teams_1_flower
    command: celery -A app.worker.celery_app flower --port=5555
    env_file:
      - .env.prod
      - ./backend/.env
    environment:
      - DEBUG=false
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:?FLOWER_PASSWORD is required}
    networks:
      - traefik-public
      - backend-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai_agent_teams_1-flower.rule=Host(`flower.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.ai_agent_teams_1-flower.entrypoints=websecure"
      - "traefik.http.routers.ai_agent_teams_1-flower.tls.certresolver=letsencrypt"
      - "traefik.http.services.ai_agent_teams_1-flower.loadbalancer.server.port=5555"
      - "traefik.docker.network=traefik-public"
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_agent_teams_1_frontend
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://app:8000
      - BACKEND_WS_URL=ws://app:8000
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai_agent_teams_1-frontend.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.ai_agent_teams_1-frontend.entrypoints=websecure"
      - "traefik.http.routers.ai_agent_teams_1-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ai_agent_teams_1-frontend.middlewares=ai_agent_teams_1-security-headers@docker"
      - "traefik.http.services.ai_agent_teams_1-frontend.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"
    depends_on:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  traefik-public:
    driver: bridge
  backend-internal:
    driver: bridge
    internal: true

volumes:
  media_data:
  traefik_letsencrypt:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
